
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Eureka · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#111318;--surface2:#181c24;--border:#1f2433;
    --accent:#00d4ff;--accent2:#00ff88;--warn:#ffb700;--danger:#ff4757;
    --text:#e8ecf4;--muted:#6b7694;--hot:#ff6b35;--cold:#4a90d9;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:600;font-size:14px;color:#0a0c10}
  .logo-text{font-family:var(--mono);font-weight:600;font-size:15px;letter-spacing:.05em}
  .hdr-right{display:flex;align-items:center;gap:16px}
  .badge{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em}
  .sync{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
  .dot.ok{background:var(--accent2)}.dot.loading{background:var(--warn);animation:blink 1s infinite}.dot.error{background:var(--danger)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
  .tab{padding:14px 20px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;white-space:nowrap}
  .tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  main{padding:24px;max-width:1200px;margin:0 auto}
  .pane{display:none}.pane.active{display:block}

  .spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;gap:14px}
  .spinner{width:34px;height:34px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin-lbl{font-family:var(--mono);font-size:12px;color:var(--muted)}

  .err{background:rgba(255,71,87,.08);border:1px solid rgba(255,71,87,.3);border-radius:8px;padding:20px 24px;font-family:var(--mono);font-size:13px;color:var(--danger);margin:20px 0;line-height:1.9}
  .err a{color:var(--warn)}
  .err code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-size:11px}

  .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:22px}
  .kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;transition:border-color .2s}
  .kcard:hover{border-color:var(--accent)}
  .klbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
  .kval{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text);line-height:1;margin-bottom:4px}
  .ksub{font-size:12px;color:var(--muted)}
  .kval.a{color:var(--accent)}.kval.g{color:var(--accent2)}.kval.w{color:var(--warn)}.kval.d{color:var(--danger)}

  .pbar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:22px}
  .pbar-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .pbar-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .pbar-val{font-family:var(--mono);font-size:13px;color:var(--text)}
  .pbar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s}
  .pbar-sub{font-size:12px;color:var(--muted);margin-top:8px}

  .twrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{padding:10px 14px;font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  tbody td{padding:11px 14px;font-size:13px;color:var(--text);white-space:nowrap}
  .m{font-family:var(--mono)}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
  .ph{background:rgba(255,107,53,.15);color:var(--hot);border:1px solid rgba(255,107,53,.3)}
  .pw{background:rgba(255,183,0,.12);color:var(--warn);border:1px solid rgba(255,183,0,.25)}
  .pc{background:rgba(74,144,217,.12);color:var(--cold);border:1px solid rgba(74,144,217,.25)}
  .pa{background:rgba(0,255,136,.12);color:var(--accent2);border:1px solid rgba(0,255,136,.25)}
  .pd{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

  .shdr{display:flex;align-items:baseline;gap:12px;margin:6px 0 14px}
  .stitle{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);text-transform:uppercase;letter-spacing:.08em}
  .ssub{font-size:12px;color:var(--muted)}

  .ibox{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--text);margin-bottom:20px}
  .ibox strong{color:var(--accent)}

  .scgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
  .sccard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
  .sccard.hl{border-color:var(--accent);background:rgba(0,212,255,.04)}
  .scname{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
  .scval{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px}
  .scconv{font-size:12px;color:var(--muted)}

  .rbtn{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s;letter-spacing:.05em}
  .rbtn:hover{border-color:var(--accent);color:var(--accent)}

  footer{text-align:center;padding:28px 24px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;border-top:1px solid var(--border);margin-top:32px}

  @media(max-width:640px){
    header{padding:0 14px}.badge{display:none}
    main{padding:14px}.kgrid{grid-template-columns:1fr 1fr}.scgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">E</div>
    <span class="logo-text">PROJETO EUREKA</span>
  </div>
  <div class="hdr-right">
    <span class="badge" id="wbadge">PIPELINE · SÃO PAULO</span>
    <div class="sync"><div class="dot" id="dot"></div><span id="slbl">—</span></div>
    <button class="rbtn" onclick="reloadAll()">↺ SYNC</button>
  </div>
</header>

<nav>
  <div class="tab active" data-tab="pipeline"   onclick="sw('pipeline')">Pipeline</div>
  <div class="tab"        data-tab="mercado"    onclick="sw('mercado')">Mercado</div>
  <div class="tab"        data-tab="cobertura"  onclick="sw('cobertura')">Cobertura</div>
  <div class="tab"        data-tab="financeiro" onclick="sw('financeiro')">Financeiro</div>
</nav>

<main>
  <div id="p-pipeline"   class="pane active"></div>
  <div id="p-mercado"    class="pane"></div>
  <div id="p-cobertura"  class="pane"></div>
  <div id="p-financeiro" class="pane"></div>
</main>

<footer>PROJETO EUREKA · CONFIDENCIAL · <span id="fwk">—</span></footer>

<script>
/* ─────────────────────────────────────────────────────────
   CONFIG
   SHEET_ID  = ID interno da planilha (da URL /d/{ID}/edit)
   GIDS      = gid de cada aba (da URL #gid=...)
───────────────────────────────────────────────────────── */
const SHEET_ID = '1xZsNM4dfv76u-LGm2chy__QKRhG5n1_MCZrMSzOiQVc';
const GIDS = {
  pipeline:   1021192406,
  mercado:    1516720884,
  cobertura:  2090253131,
  financeiro: 418220658,
};
const META_Q2 = 1000000;

/* ─────────────────────────────────────────────────────────
   FETCH via gviz/tq  →  funciona para planilhas:
   (a) compartilhadas como "Qualquer pessoa com link" (view)
   (b) publicadas na web
   Usa JSONP para contornar CORS.
───────────────────────────────────────────────────────── */
const _cache = {};

function fetchTab(name) {
  if (_cache[name]) return Promise.resolve(_cache[name]);
  return new Promise((resolve, reject) => {
    const cbName = '__gviz_' + name + '_' + Date.now();
    let script;

    const cleanup = () => {
      clearTimeout(timer);
      delete window[cbName];
      if (script && script.parentNode) script.remove();
    };

    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('Timeout (15s) — planilha pode não estar acessível publicamente.'));
    }, 15000);

    window[cbName] = function(data) {
      cleanup();
      try {
        const rows = gviz2rows(data);
        _cache[name] = rows;
        resolve(rows);
      } catch(e) {
        reject(e);
      }
    };

    script = document.createElement('script');
    // Usa o ID interno — compatível com gviz/tq
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`
               + `?gid=${GIDS[name]}`
               + `&tqx=out:json;responseHandler:${cbName}`
               + `&tq=${encodeURIComponent('select *')}`;
    script.onerror = () => {
      cleanup();
      reject(new Error(
        'Falha ao carregar dados. Certifique-se de que a planilha está '
        + 'compartilhada como "Qualquer pessoa com o link pode visualizar".'
      ));
    };
    document.head.appendChild(script);
  });
}

/* ─────────────────────────────────────────────────────────
   Converte resposta gviz → array de objetos [{col: val}]
───────────────────────────────────────────────────────── */
function gviz2rows(data) {
  const t = data.table;
  if (!t || !t.cols) throw new Error('Resposta gviz inválida — verifique os GIDs das abas.');
  const hdrs = t.cols.map(c => (c.label || c.id || '').trim());
  return (t.rows || [])
    .map(r => {
      const obj = {};
      hdrs.forEach((h, i) => {
        const cell = r.c ? r.c[i] : null;
        obj[h] = (cell && cell.v != null) ? String(cell.v) : '';
      });
      return obj;
    })
    .filter(r => Object.values(r).some(v => v.trim() !== ''));
}

/* ─────────────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────────────── */
const f   = v => (!v || !String(v).trim()) ? '—' : String(v).trim();
const num = v => { const n = parseFloat(String(v||'').replace(/[R$\s]/g,'').replace(/\./g,'').replace(',','.')); return isNaN(n)?0:n; };
const brl = v => {
  const n = num(v);
  if (!v || !String(v).trim() || n===0 && !/\d/.test(String(v))) return '—';
  if (n >= 1e6) return 'R$'+(n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return 'R$'+Math.round(n/1e3)+'k';
  return 'R$'+Math.round(n);
};
const col = (keys,...pats) => keys.find(k => pats.some(p=>p.test(k.toLowerCase()))) || null;

function badge(s) {
  if (!s || !s.trim()) return `<span class="pill pd">—</span>`;
  const l = s.toLowerCase();
  if (/quente|hot/.test(l))  return `<span class="pill ph">${s}</span>`;
  if (/morno|warm/.test(l))  return `<span class="pill pw">${s}</span>`;
  if (/frio|cold/.test(l))   return `<span class="pill pc">${s}</span>`;
  if (/ativ/.test(l))        return `<span class="pill pa">${s}</span>`;
  return `<span class="pill pd">${s}</span>`;
}

function wkInfo() {
  const n  = new Date();
  const s  = new Date(n.getFullYear(),0,1);
  const wk = Math.ceil(((n-s)/86400000 + s.getDay()+1)/7);
  const q  = Math.ceil((n.getMonth()+1)/3);
  const hm = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  return { wk, q, yr: n.getFullYear(), hm };
}

function setSync(st, lbl) {
  document.getElementById('dot').className = 'dot ' + st;
  document.getElementById('slbl').textContent = lbl;
}

/* ─────────────────────────────────────────────────────────
   RENDERERS
───────────────────────────────────────────────────────── */
function renderPipeline(rows) {
  const K  = Object.keys(rows[0]||{});
  const cM = col(K,/munic/,/cidade/,/nome/) || K[0];
  const cS = col(K,/status/,/temp/);
  const cE = col(K,/etapa/,/fase/);
  const cP = col(K,/potenci/);
  const cA = col(K,/ajust/);
  const cF = col(K,/fundeb/);
  const cD = col(K,/dias/,/day/);
  const cR = col(K,/regi/,/region/);
  const cU = col(K,/alun/,/student/);

  const data = rows.filter(r => r[cM]&&r[cM].trim());
  const totP = data.reduce((s,r)=>s+num(r[cP]||''),0);
  const totA = data.reduce((s,r)=>s+num(r[cA]||''),0);
  const pct  = Math.min(100, totA/META_Q2*100).toFixed(1);

  const {wk,q,yr} = wkInfo();
  document.getElementById('wbadge').textContent = `W${wk} · Q${q} ${yr}`;
  document.getElementById('fwk').textContent    = `Semana ${wk} · Q${q} ${yr}`;

  const cols = [cM,cR,cS,cE,cU,cP,cA,cF,cD].filter(Boolean);
  const lbl  = {[cM]:'Município',[cR]:'Região',[cS]:'Status',[cE]:'Etapa',
                [cU]:'Alunos',[cP]:'Potencial',[cA]:'Ajustado',[cF]:'FUNDEB',[cD]:'Dias'};

  return `
  <div class="kgrid">
    <div class="kcard"><div class="klbl">Municípios Pipeline</div><div class="kval a">${data.length}</div><div class="ksub">ativos ou mapeados</div></div>
    <div class="kcard"><div class="klbl">Receita Potencial</div><div class="kval">${brl(totP)}</div><div class="ksub">soma do pipeline</div></div>
    <div class="kcard"><div class="klbl">Forecast Ajustado</div><div class="kval g">${brl(totA)}</div><div class="ksub">${pct}% da meta Q2</div></div>
    <div class="kcard"><div class="klbl">Meta Q2</div><div class="kval w">R$1,0M</div><div class="ksub">gap: ${brl(META_Q2-totA)}</div></div>
  </div>
  <div class="pbar-wrap">
    <div class="pbar-hdr"><span class="pbar-lbl">Progresso Meta Q2</span><span class="pbar-val">${brl(totA)} / R$1,0M</span></div>
    <div class="pbar-bg"><div class="pbar-fill" style="width:${pct}%"></div></div>
    <div class="pbar-sub">${pct}% atingido · Potencial: ${brl(totP)}</div>
  </div>
  <div class="shdr"><span class="stitle">Municípios no Pipeline</span><span class="ssub">${data.length} registros</span></div>
  <div class="twrap"><table>
    <thead><tr>${cols.map(c=>`<th>${lbl[c]||c}</th>`).join('')}</tr></thead>
    <tbody>${data.map(r=>`<tr>${cols.map(c=>{
      const v=r[c]||'';
      if(c===cM) return `<td><strong>${f(v)}</strong></td>`;
      if(c===cS) return `<td>${badge(v)}</td>`;
      if(c===cP||c===cF) return `<td class="m" style="color:var(--muted);font-size:12px">${brl(v)}</td>`;
      if(c===cA) return `<td class="m" style="color:var(--accent2)">${brl(v)}</td>`;
      return `<td class="m" style="font-size:12px">${f(v)}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMercado(rows) {
  const K  = Object.keys(rows[0]||{});
  const cM = col(K,/munic/,/cidade/,/nome/) || K[0];
  const cR = col(K,/regi/);
  const cU = col(K,/alun/);
  const cP = col(K,/receita/,/potenci/,/revenue/);
  const cF = col(K,/fundeb/);
  const cX = col(K,/pct/,/percent/);
  const cC = col(K,/canal/,/via/,/partner/);

  const data   = rows.filter(r=>r[cM]&&r[cM].trim());
  const totU   = data.reduce((s,r)=>s+(parseInt((r[cU]||'').replace(/\D/g,''))||0),0);
  const totP   = data.reduce((s,r)=>s+num(r[cP]||''),0);
  const sorted = [...data].sort((a,b)=>num(b[cP]||'')-num(a[cP]||''));
  const cols   = [cM,cR,cU,cP,cF,cX,cC].filter(Boolean);
  const lbl    = {[cM]:'Município',[cR]:'Região',[cU]:'Alunos',[cP]:'Receita',
                  [cF]:'FUNDEB',[cX]:'% FUNDEB',[cC]:'Canal'};

  return `
  <div class="kgrid">
    <div class="kcard"><div class="klbl">Municípios SOM</div><div class="kval a">${data.length}</div><div class="ksub">mapeados em SP</div></div>
    <div class="kcard"><div class="klbl">Alunos SOM</div><div class="kval">${totU.toLocaleString('pt-BR')}</div><div class="ksub">EF1 + EF2</div></div>
    <div class="kcard"><div class="klbl">Receita Total SOM</div><div class="kval g">${brl(totP)}</div><div class="ksub">potencial das ${data.length}</div></div>
    <div class="kcard"><div class="klbl">TAM SP</div><div class="kval w">R$2,6B</div><div class="ksub">5,46M alunos EF</div></div>
  </div>
  <div class="shdr"><span class="stitle">Municípios Mapeados</span><span class="ssub">${data.length} · por receita</span></div>
  <div class="twrap"><table>
    <thead><tr>${cols.map(c=>`<th>${lbl[c]||c}</th>`).join('')}</tr></thead>
    <tbody>${sorted.map(r=>`<tr>${cols.map(c=>{
      const v=r[c]||'';
      if(c===cM) return `<td><strong>${f(v)}</strong></td>`;
      if(c===cP) return `<td class="m" style="color:var(--accent2)">${brl(v)}</td>`;
      if(c===cF) return `<td class="m" style="color:var(--muted);font-size:12px">${brl(v)}</td>`;
      return `<td style="font-size:12px">${f(v)}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function renderCobertura(rows) {
  const K  = Object.keys(rows[0]||{});
  const cR = col(K,/regi/,/region/) || K[0];
  const cC = col(K,/cidad/,/count/,/qtd/);
  const cA = col(K,/ativ/,/active/,/pipeline/);
  const cP = col(K,/receita/,/potenci/);
  const cS = col(K,/status/,/cobert/);

  const data   = rows.filter(r=>r[cR]&&r[cR].trim());
  const semCob = data.filter(r=>parseInt(r[cA]||'0')===0).length;
  const cols   = [cR,cC,cA,cP,cS].filter(Boolean);
  const lbl    = {[cR]:'Região',[cC]:'Cidades',[cA]:'Ativas',[cP]:'Receita Potencial',[cS]:'Status'};

  return `
  <div class="kgrid">
    <div class="kcard"><div class="klbl">Regiões Mapeadas</div><div class="kval a">${data.length}</div><div class="ksub">Estado de SP</div></div>
    <div class="kcard"><div class="klbl">Sem Cobertura</div><div class="kval d">${semCob}</div><div class="ksub">oportunidade imediata</div></div>
  </div>
  <div class="ibox">⚡ <strong>Oportunidade:</strong> Regiões sem municípios no pipeline representam potencial imediato de expansão.</div>
  <div class="shdr"><span class="stitle">Cobertura por Região</span><span class="ssub">${data.length} regiões</span></div>
  <div class="twrap"><table>
    <thead><tr>${cols.map(c=>`<th>${lbl[c]||c}</th>`).join('')}</tr></thead>
    <tbody>${data.map(r=>`<tr>${cols.map(c=>{
      const v=r[c]||'';
      if(c===cR) return `<td><strong>${f(v)}</strong></td>`;
      if(c===cA){const n=parseInt(v)||0;return `<td class="m" style="color:${n>0?'var(--accent2)':'var(--danger)'}">${n}</td>`;}
      if(c===cP) return `<td class="m">${brl(v)}</td>`;
      if(c===cS) return `<td>${badge(v)}</td>`;
      return `<td style="font-size:12px">${f(v)}</td>`;
    }).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function renderFinanceiro(rows) {
  const K  = Object.keys(rows[0]||{});
  const c0 = K[0], c1 = K[1];

  const sc = p => rows.find(r => p.test(r[c0]||''));
  const vC = brl((sc(/conser/i)||{})[c1]||'') === '—' ? 'R$6,6M'  : brl((sc(/conser/i)||{})[c1]);
  const vR = brl((sc(/reali/i) ||{})[c1]||'') === '—' ? 'R$13,1M' : brl((sc(/reali/i)||{})[c1]);
  const vA = brl((sc(/agress/i)||{})[c1]||'') === '—' ? 'R$26,2M' : brl((sc(/agress/i)||{})[c1]);

  return `
  <div class="kgrid">
    <div class="kcard"><div class="klbl">FUNDEB SP</div><div class="kval a">R$53,6B</div><div class="ksub">2024 distribuído</div></div>
    <div class="kcard"><div class="klbl">% FUNDEB Médio</div><div class="kval">20,5%</div><div class="ksub">pond. por alunos · 40% disp.</div></div>
  </div>
  <div class="shdr"><span class="stitle">Cenários de Receita — 27 Municípios SOM</span></div>
  <div class="scgrid">
    <div class="sccard"><div class="scname">Conservador</div><div class="scval">${vC}</div><div class="scconv">Conversão: 25%</div></div>
    <div class="sccard hl"><div class="scname">Realista</div><div class="scval" style="color:var(--accent)">${vR}</div><div class="scconv">Conversão: 50%</div></div>
    <div class="sccard"><div class="scname">Agressivo</div><div class="scval" style="color:var(--accent2)">${vA}</div><div class="scconv">Conversão: 100%</div></div>
  </div>
  <div class="ibox">📌 Em média, o investimento representa <strong>20,5%</strong> do FUNDEB disponível (40% livre). Varia de <strong>8,9%</strong> (Pirassununga) a <strong>29,5%</strong> (Campinas).</div>
  <div class="shdr"><span class="stitle">Dados da Planilha</span><span class="ssub">${rows.length} linhas</span></div>
  <div class="twrap"><table>
    <thead><tr>${K.slice(0,8).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${K.slice(0,8).map(k=>`<td class="m" style="font-size:12px">${f(r[k]||'')}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function renderGeneric(rows, name) {
  if (!rows.length) return `<div class="err">Nenhum dado encontrado na aba "${name}".</div>`;
  const K = Object.keys(rows[0]);
  return `<div class="shdr"><span class="stitle">${name}</span><span class="ssub">${rows.length} linhas</span></div>
  <div class="twrap"><table>
    <thead><tr>${K.map(k=>`<th>${k}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${K.map(k=>`<td style="font-size:12px">${f(r[k]||'')}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

/* ─────────────────────────────────────────────────────────
   LOAD / SWITCH / RELOAD
───────────────────────────────────────────────────────── */
async function loadTab(name) {
  const el = document.getElementById('p-' + name);
  el.innerHTML = `<div class="spin-wrap"><div class="spinner"></div><span class="spin-lbl">Carregando ${name}…</span></div>`;
  try {
    const rows = await fetchTab(name);
    let html;
    if      (name === 'pipeline')   html = renderPipeline(rows);
    else if (name === 'mercado')    html = renderMercado(rows);
    else if (name === 'cobertura')  html = renderCobertura(rows);
    else if (name === 'financeiro') html = renderFinanceiro(rows);
    else html = renderGeneric(rows, name);
    el.innerHTML = html || renderGeneric(rows, name);
  } catch(err) {
    el.innerHTML = `<div class="err">
      ❌ <strong>Erro ao carregar "${name}":</strong><br>${err.message}<br><br>
      <strong>Checklist:</strong><br>
      1. Planilha → <em>Compartilhar</em> → <em>Qualquer pessoa com o link</em> → <strong>Visualizador</strong> ✓<br>
      2. GID desta aba: <code>${GIDS[name]}</code> — confira na URL da planilha ao clicar nesta aba<br><br>
      <a href="https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GIDS[name]}&tqx=out:csv" target="_blank">
        🔗 Testar dados desta aba diretamente
      </a>
    </div>`;
  }
}

function sw(name) {
  document.querySelectorAll('.tab').forEach(t  => t.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById('p-' + name).classList.add('active');
}

async function reloadAll() {
  Object.keys(_cache).forEach(k => delete _cache[k]);
  setSync('loading', 'sincronizando…');
  let errs = 0;
  await Promise.all(
    ['pipeline','mercado','cobertura','financeiro'].map(t => loadTab(t).catch(() => errs++))
  );
  const {hm} = wkInfo();
  setSync(errs ? 'error' : 'ok', errs ? `${errs} erro(s)` : hm);
}

reloadAll();
</script>
</body>
</html>
