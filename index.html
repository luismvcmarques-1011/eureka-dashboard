<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projeto Eureka · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#020817;--sf:#0f172a;--sf2:#1e293b;--bd:#1e293b;--ac:#3b82f6;--ac2:#10b981;--pu:#8b5cf6;--wn:#f59e0b;--dg:#ef4444;--tx:#f1f5f9;--mu:#475569;--mu2:#64748b;--mu3:#94a3b8;--mono:'IBM Plex Mono',monospace;--syne:'Syne',sans-serif;--dm:'DM Sans',sans-serif;}
body{background:var(--bg);color:var(--tx);font-family:var(--dm);min-height:100vh;overflow-x:hidden}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(30,41,59,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(30,41,59,.3) 1px,transparent 1px);background-size:48px 48px}
body::after{content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
header{background:rgba(2,8,23,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:11px}
.logo-i{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--pu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--syne);font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
.logo-name{font-family:var(--syne);font-weight:800;font-size:16px;letter-spacing:-.02em}
.logo-sub{color:var(--mu2);font-size:9px;font-family:var(--mono);letter-spacing:.08em}
.hdr-r{display:flex;align-items:center;gap:8px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--ac2);animation:pulse2 2s infinite}
.hdr-badge{color:var(--mu2);font-size:10px;font-family:var(--mono)}
.sync-btn{background:none;border:1px solid var(--bd);color:var(--mu2);padding:5px 12px;border-radius:6px;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .2s}
.sync-btn:hover{border-color:var(--ac);color:var(--ac)}
nav{background:rgba(2,8,23,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--bd);padding:0 36px;display:flex}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);padding:11px 14px;cursor:pointer;font-size:13px;font-family:var(--dm);margin-bottom:-1px;transition:all .2s;white-space:nowrap}
.tab:hover{color:var(--tx)}.tab.active{color:var(--tx);border-bottom-color:var(--ac);font-weight:600}
main{padding:22px 36px;max-width:1200px;margin:0 auto;position:relative;z-index:1}
.pane{display:none;animation:fadeIn .3s ease}.pane.active{display:block}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px}
.spinner{width:32px;height:32px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
.loading-txt{font-family:var(--mono);font-size:12px;color:var(--mu2)}
.err-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:18px 22px;font-family:var(--mono);font-size:13px;color:var(--dg);line-height:1.8}
.kg{display:grid;gap:10px;margin-bottom:18px}
.kg-4{grid-template-columns:repeat(4,1fr)}.kg-3{grid-template-columns:repeat(3,1fr)}.kg-2{grid-template-columns:repeat(2,1fr)}
.kc{background:rgba(15,23,42,.75);border-radius:14px;padding:13px 15px;position:relative;overflow:hidden;min-width:0}
.kc-shine{position:absolute;top:0;left:0;right:0;height:2px;animation:shimmer 2.5s infinite}
.kl{color:var(--mu2);font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-family:var(--mono);margin-bottom:5px}
.kv{font-family:var(--syne);font-weight:700;font-size:clamp(15px,4.5vw,24px);line-height:1.1;margin-bottom:4px}
.ks{color:var(--mu);font-size:10px;font-family:var(--mono)}
.pbar-wrap{background:rgba(15,23,42,.6);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:18px}
.pbar-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap;gap:6px}
.pbar-lbl{color:var(--mu3);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-family:var(--mono);margin-bottom:3px}
.pbar-val{font-family:var(--syne);font-size:clamp(15px,4vw,21px);font-weight:700}
.pbar-pct{font-family:var(--mono);font-size:clamp(18px,5vw,26px);font-weight:700}
.pbar-bg{background:var(--sf2);border-radius:99px;height:8px;overflow:hidden;margin-bottom:7px}
.pbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width 1.2s ease}
.pbar-sub{color:var(--mu);font-size:10px;font-family:var(--mono)}
.card{background:rgba(15,23,42,.6);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;margin-bottom:18px}
.tw{background:rgba(15,23,42,.6);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:18px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;font-family:var(--mono);font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:.08em;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap}
tbody tr{border-bottom:1px solid rgba(30,41,59,.5);transition:background .15s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(30,41,59,.4)}
tbody td{padding:12px 16px;font-size:13px;white-space:nowrap}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono)}
.pill::before{content:'';width:5px;height:5px;border-radius:50%}
.pQ{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444}.pQ::before{background:#ef4444}
.pM{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);color:var(--wn)}.pM::before{background:var(--wn)}
.pF{background:rgba(100,116,139,.12);border:1px solid rgba(100,116,139,.25);color:#94a3b8}.pF::before{background:#94a3b8}
.pR1{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--ac2)}.pR1::before{background:var(--ac2)}
.pSQL{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:#7dd3fc}.pSQL::before{background:#7dd3fc}
.pR2{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);color:var(--pu)}.pR2::before{background:var(--pu)}
.sh{display:flex;align-items:baseline;gap:12px;margin:6px 0 14px}
.st{font-family:var(--syne);font-size:14px;font-weight:700;color:var(--tx)}.ss{font-size:11px;color:var(--mu2)}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:22px 18px;text-align:center;transition:border-color .2s}
.sc.hl{border-color:var(--ac);background:rgba(59,130,246,.05)}
.sn{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--mu2);margin-bottom:12px}
.sv{font-family:var(--syne);font-size:clamp(16px,4vw,24px);font-weight:700;margin-bottom:6px}
.sc2{font-size:11px;color:var(--mu2);font-family:var(--mono)}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:18px}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:14px 16px}
.pl{font-family:var(--mono);font-size:9px;color:var(--mu2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.pv{font-family:var(--syne);font-size:18px;font-weight:700;color:var(--ac)}
footer{border-top:1px solid var(--sf2);padding:11px 36px;display:flex;justify-content:space-between;color:var(--sf2);font-size:10px;font-family:var(--mono);flex-wrap:wrap;gap:4px;position:relative;z-index:1}
@media(max-width:640px){header,nav,main,footer{padding-left:14px;padding-right:14px}.kg-4,.kg-3{grid-template-columns:1fr 1fr}.sg{grid-template-columns:1fr}.logo-sub{display:none}}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-i">E</div><div><div class="logo-name">Projeto Eureka</div><div class="logo-sub">PIPELINE · SÃO PAULO</div></div></div>
  <div class="hdr-r"><div class="live-dot"></div><span class="hdr-badge" id="wbadge">—</span><button class="sync-btn" onclick="reloadAll()">↺ Sync</button></div>
</header>
<nav>
  <button class="tab active" data-tab="pipeline" onclick="sw('pipeline')">Pipeline</button>
  <button class="tab" data-tab="health" onclick="sw('health')">Health</button>
  <button class="tab" data-tab="cobertura" onclick="sw('cobertura')">Cobertura</button>
  <button class="tab" data-tab="municipios" onclick="sw('municipios')">Municípios</button>
</nav>
<main>
  <div id="p-pipeline" class="pane active"></div>
  <div id="p-health" class="pane"></div>
  <div id="p-cobertura" class="pane"></div>
  <div id="p-municipios" class="pane"></div>
</main>
<footer><span>PROJETO EUREKA · CONFIDENCIAL</span><span id="fwk">—</span></footer>
<script>
var SID='1xZsNM4dfv76u-LGm2chy__QKRhG5n1_MCZrMSzOiQVc';
var GIDS={pipeline:1021192406,health:1516720884,cobertura:2090253131,municipios:418220658};
var _cache={};
function fetchTab(name){
  if(_cache[name])return Promise.resolve(_cache[name]);
  return new Promise(function(ok,fail){
    var cb='__gviz_'+name+'_'+Date.now(),s;
    var t=setTimeout(function(){cleanup();fail(new Error('Timeout'));},15000);
    function cleanup(){clearTimeout(t);delete window[cb];if(s&&s.parentNode)s.remove();}
    window[cb]=function(d){cleanup();try{var r=gvizParse(d);_cache[name]=r;ok(r);}catch(e){fail(e);}};
    s=document.createElement('script');
    s.src='https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?gid='+GIDS[name]+'&tqx=out:json;responseHandler:'+cb+'&tq=select%20*';
    s.onerror=function(){cleanup();fail(new Error('Falha ao carregar. Planilha deve estar compartilhada como "Qualquer pessoa com o link".'));};
    document.head.appendChild(s);
  });
}
function gvizParse(d){
  var t=d.table;if(!t||!t.cols)throw new Error('Resposta inválida');
  var h=t.cols.map(function(c){return(c.label||c.id||'').trim();});
  return(t.rows||[]).map(function(r){var o={};h.forEach(function(k,i){var c=r.c?r.c[i]:null;o[k]=(c&&c.v!=null)?c.v:'';});return o;});
}
function brl(n){
  if(n==null||n==='')return'—';
  var v;
  if(typeof n==='number'){v=n;}
  else{
    var s=String(n).replace(/R$s*/g,'').trim();
    if(s.indexOf('.')!==-1&&s.indexOf(',')!==-1){s=s.replace(/./g,'').replace(',','.');}
    else if(s.indexOf('.')!==-1){if(/.d{3}/.test(s)||s.split('.').length>2)s=s.replace(/./g,'');}
    else if(s.indexOf(',')!==-1){s=s.replace(',','.');}
    v=parseFloat(s);
  }
  if(isNaN(v)||v===0)return'—';
  var abs=Math.abs(v),sign=v<0?'-':'';
  if(abs>=1e6)return sign+'R$'+(abs/1e6).toFixed(1)+'M';
  if(abs>=1e3)return sign+'R$'+Math.round(abs/1e3)+'k';
  return sign+'R$'+Math.round(abs);
}
function pct(n){if(n==null||n==='')return'—';var v=typeof n==='number'?n:parseFloat(n);return isNaN(v)?String(n):(v*100).toFixed(1)+'%';}
function fmtNum(n){if(n==null||n==='')return'—';return Number(n).toLocaleString('pt-BR');}
function wkInfo(){var n=new Date(),s=new Date(n.getFullYear(),0,1),wk=Math.ceil(((n-s)/86400000+s.getDay()+1)/7),q=Math.ceil((n.getMonth()+1)/3),hm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');return{wk:wk,q:q,yr:n.getFullYear(),hm:hm};}
function pill(cls,txt){return'<span class="pill '+cls+'">'+txt+'</span>';}
function farolPill(f){var m={Q:['pQ','Quente'],M:['pM','Morno'],F:['pF','Frio']};var p=m[f];if(!p)return pill('pF',f||'—');return pill(p[0],p[1]);}
function statusPill(s){var m={R1:'pR1',R2:'pR2',SQL:'pSQL'};return pill(m[s]||'pF',s||'—');}
function kpi(label,value,sub,accent,pulse){
  var shine=pulse?'<div class="kc-shine" style="background:linear-gradient(90deg,transparent,'+accent+',transparent)"></div>':'';
  return'<div class="kc" style="border:1px solid '+accent+'28">'+shine+'<div class="kl">'+label+'</div><div class="kv" style="color:'+accent+'">'+value+'</div>'+(sub?'<div class="ks">'+sub+'</div>':'')+'</div>';
}
function renderPipeline(rows){
  var r0=rows[0]||{};
  var meta=Number(r0['B'])||1000000;
  var semanas=rows.filter(function(r){return r['A']&&/^Wd+/.test(String(r['A']));});
  var ul=semanas[semanas.length-1]||{};
  var forecast=Number(ul['B'])||0;
  var gap=forecast-meta;
  var munAtual=Number(ul['D'])||Number(r0['J'])||0;
  var etapa=r0['K']||'—';
  var pBar=meta>0?Math.min(200,Math.max(0,(forecast/meta)*100)).toFixed(1):'0.0';
  var gapLbl=gap>=0?'✅ acima da meta':'falta fechar';
  var gapClr=gap>=0?'#10b981':'#f59e0b';
  var info=wkInfo();
  document.getElementById('wbadge').textContent='W'+info.wk+' · Q'+info.q+' '+info.yr;
  document.getElementById('fwk').textContent='Semana '+info.wk+' · Q'+info.q+' '+info.yr;
  var h='<div class="kg kg-4">';
  h+=kpi('Meta Q2',brl(meta),'objetivo do trimestre','#3b82f6',true);
  h+=kpi('Forecast Atual',brl(forecast),pBar+'% da meta','#10b981',false);
  h+=kpi('Municípios Ativos',String(munAtual),'W'+info.wk+' · Etapa '+etapa,'#8b5cf6',false);
  h+=kpi('Gap (B/W)',brl(Math.abs(gap)),gapLbl,gapClr,false);
  h+='</div>';
  h+='<div class="pbar-wrap"><div class="pbar-top"><div><div class="pbar-lbl">Progresso Meta Q2</div><div class="pbar-val">'+brl(forecast)+'<span style="color:var(--mu);font-size:12px;font-weight:400;margin-left:6px">/ '+brl(meta)+'</span></div></div>';
  h+='<div class="pbar-pct" style="color:var(--ac2)">'+pBar+'%</div></div>';
  h+='<div class="pbar-bg"><div class="pbar-fill" style="width:'+Math.min(100,parseFloat(pBar))+'%"></div></div>';
  h+='<div class="pbar-sub">'+(forecast>=meta?'🎉 Meta atingida! ':'Faltam '+brl(meta-forecast)+' para fechar · ')+semanas.length+' semanas registradas</div></div>';
  if(semanas.length>0){
    h+='<div class="sh"><span class="st">Evolução Semanal</span><span class="ss">'+semanas.length+' semanas</span></div>';
    h+='<div class="tw"><table><thead><tr><th>Semana</th><th>Receita Pot.</th><th>Δ Semana</th><th>Municípios</th></tr></thead><tbody>';
    semanas.forEach(function(r){
      var dPct=(r['C']!==''&&r['C']!=null)?((Number(r['C'])*100).toFixed(1)+'%'):'—';
      h+='<tr><td style="font-family:var(--mono);color:var(--ac);font-weight:700">'+r['A']+'</td><td style="font-family:var(--mono);color:var(--ac2);font-weight:600">'+brl(r['B'])+'</td><td style="font-family:var(--mono);color:var(--wn)">'+dPct+'</td><td style="font-family:var(--mono)">'+(r['D']||'—')+'</td></tr>';
    });
    h+='</tbody></table></div>';
  }
  return h;
}
function renderHealth(rows){
  if(!rows||rows.length===0)return'<div class="err-box">Sem dados na aba Health.</div>';
  var keys=Object.keys(rows[0]||{});
  var porStatus={},porFarol={};
  rows.forEach(function(r){keys.forEach(function(k){var v=String(r[k]||'').trim();if(/^(SQL|R1|R2|R3|Licitação)$/.test(v))porStatus[v]=(porStatus[v]||0)+1;if(/^[QMF]$/.test(v))porFarol[v]=(porFarol[v]||0)+1;});});
  var total=Object.values(porStatus).reduce(function(s,n){return s+n;},0);
  var funil=[{e:'SQL',c:porStatus['SQL']||0,cor:'#64748b',p:25},{e:'R1',c:porStatus['R1']||0,cor:'#3b82f6',p:30},{e:'R2',c:porStatus['R2']||0,cor:'#8b5cf6',p:40},{e:'R3',c:porStatus['R3']||0,cor:'#f59e0b',p:50},{e:'Licitação',c:porStatus['Licitação']||0,cor:'#10b981',p:85}];
  var maxC=Math.max(1,Math.max.apply(null,funil.map(function(f){return f.c;})));
  var h='<div class="kg kg-4">';
  h+=kpi('Total no Pipeline',String(total||rows.length),'municípios','#3b82f6',true);
  h+=kpi('🔥 Quente',String(porFarol['Q']||0),'alta prioridade','#ef4444',false);
  h+=kpi('🟡 Morno',String(porFarol['M']||0),'média prioridade','#f59e0b',false);
  h+=kpi('❄️ Frio',String(porFarol['F']||0),'baixa prioridade','#64748b',false);
  h+='</div>';
  if(total>0){
    h+='<div class="sh"><span class="st">Funil de Vendas</span><span class="ss">'+total+' municípios</span></div><div class="card">';
    funil.forEach(function(f){
      var w=f.c>0?Math.max(6,(f.c/maxC)*100):0;
      h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:70px;color:var(--mu2);font-size:11px;font-family:var(--mono);text-align:right;flex-shrink:0">'+f.e+'</div><div style="flex:1;background:var(--sf2);border-radius:4px;height:28px;overflow:hidden"><div style="width:'+w+'%;height:100%;background:'+f.cor+';display:flex;align-items:center;padding-left:8px;transition:width .8s ease">'+(f.c>0?'<span style="color:#fff;font-size:13px;font-weight:700;font-family:var(--mono)">'+f.c+'</span>':'')+'</div></div><div style="width:36px;color:var(--mu2);font-size:10px;font-family:var(--mono);flex-shrink:0">'+f.p+'%</div></div>';
    });
    h+='</div>';
  }
  var actCols=keys.filter(function(k){return rows.some(function(r){return r[k]!==''&&r[k]!=null;});}).slice(0,12);
  h+='<div class="sh"><span class="st">Dados Health</span><span class="ss">'+rows.length+' linhas</span></div><div class="tw"><table><thead><tr>'+actCols.map(function(c){return'<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>';
  rows.filter(function(r){return actCols.some(function(c){return r[c]!==''&&r[c]!=null;});}).forEach(function(r){
    h+='<tr>'+actCols.map(function(c){var v=r[c];if(v===''||v==null)return'<td style="color:var(--mu2)">—</td>';if(/farol/i.test(c))return'<td>'+farolPill(String(v))+'</td>';if(/status/i.test(c))return'<td>'+statusPill(String(v))+'</td>';if(typeof v==='number'&&v>=1000)return'<td style="font-family:var(--mono);color:var(--ac2)">'+brl(v)+'</td>';return'<td style="font-size:12px">'+v+'</td>';}).join('')+'</tr>';
  });
  h+='</tbody></table></div>';return h;
}
function renderCobertura(rows){
  var r0=rows[0]||{},keys=Object.keys(r0);
  var labels=['Repasse/Aluno EF1','Repasse/Aluno EF2','Impostos','Part. Redesa','Mín. Receita/Mun','Mín. Alunos/Mun','Mun. Atendidos','% do SOM'];
  var h='<div class="sh"><span class="st">Parâmetros do Modelo</span></div><div class="pg">';
  keys.slice(0,8).forEach(function(k,i){
    var v=r0[k];var fmt='';
    if(v===''||v==null)fmt='—';
    else if(typeof v==='number'&&v>0&&v<1)fmt=(v*100).toFixed(1)+'%';
    else if(typeof v==='number'&&v>=400)fmt='R$ '+v.toLocaleString('pt-BR');
    else fmt=String(v);
    h+='<div class="pc"><div class="pl">'+(labels[i]||k)+'</div><div class="pv">'+fmt+'</div></div>';
  });
  h+='</div>';
  var linCen=rows.slice(1).filter(function(r){return Object.values(r).some(function(v){return v!==''&&v!=null;});});
  if(linCen.length>0){
    var ac=Object.keys(linCen[0]).filter(function(k){return linCen.some(function(r){return r[k]!==''&&r[k]!=null;});}).slice(0,8);
    h+='<div class="sh"><span class="st">Cenários do Modelo</span><span class="ss">'+linCen.length+' linhas</span></div><div class="tw"><table><thead><tr>'+ac.map(function(c){return'<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>';
    linCen.forEach(function(r){h+='<tr>'+ac.map(function(c){var v=r[c];if(v===''||v==null)return'<td style="color:var(--mu2)">—</td>';if(typeof v==='number'&&v>0&&v<1)return'<td style="font-family:var(--mono)">'+(v*100).toFixed(1)+'%</td>';if(typeof v==='number'&&v>=1000)return'<td style="font-family:var(--mono);color:var(--ac2)">'+brl(v)+'</td>';return'<td style="font-size:12px">'+v+'</td>';}).join('')+'</tr>';});
    h+='</tbody></table></div>';
  }
  return h;
}
function renderMunicipios(rows){
  var C={idx:'A',mun:'B',pref:'PREFEITO(A)',ind:'Indicação',farol:'Farol',alunos:'TAM (Alunos)',fundeb:'Fundeb (Potencial)',status:'Status',receita:'Receita Potencial',pctF:'% Fundeb'};
  var data=rows.filter(function(r){return r[C.mun]&&String(r[C.mun]).trim()!=='';});
  var totA=data.reduce(function(s,r){return s+(Number(r[C.alunos])||0);},0);
  var totR=data.reduce(function(s,r){return s+(Number(r[C.receita])||0);},0);
  var q=data.filter(function(r){return r[C.farol]==='Q';}).length;
  var m=data.filter(function(r){return r[C.farol]==='M';}).length;
  var h='<div class="kg kg-4">';
  h+=kpi('Municípios SOM',String(data.length),'mapeados em SP','#3b82f6',false);
  h+=kpi('Alunos EF (TAM)',fmtNum(totA),'EF1 + EF2','#8b5cf6',false);
  h+=kpi('Receita Potencial',brl(totR),'soma dos '+data.length+' mun.','#10b981',true);
  h+=kpi('🔥 Quente / 🟡 Morno',q+' / '+m,'por farol','#f59e0b',false);
  h+='</div>';
  var sorted=data.slice().sort(function(a,b){return(Number(b[C.receita])||0)-(Number(a[C.receita])||0);});
  h+='<div class="sh"><span class="st">Lista de Municípios</span><span class="ss">'+data.length+' · por receita</span></div>';
  h+='<div class="tw"><table><thead><tr><th>#</th><th>Município</th><th>Farol</th><th>Status</th><th>Alunos</th><th>Receita Pot.</th><th>% FUNDEB</th><th>Indicação</th><th>Prefeito(a)</th></tr></thead><tbody>';
  sorted.forEach(function(r){
    var pF=r[C.pctF],pFS=(pF!==''&&pF!=null)?((Number(pF)*100).toFixed(1)+'%'):'—';
    h+='<tr><td style="font-family:var(--mono);color:var(--mu2);font-size:11px">'+(r[C.idx]||'—')+'</td><td><strong style="font-family:var(--syne)">'+(r[C.mun]||'—')+'</strong></td><td>'+farolPill(r[C.farol])+'</td><td>'+statusPill(r[C.status])+'</td><td style="font-family:var(--mono)">'+(r[C.alunos]?fmtNum(r[C.alunos]):'—')+'</td><td style="font-family:var(--mono);color:var(--ac2);font-weight:600">'+brl(r[C.receita])+'</td><td style="font-family:var(--mono);color:var(--mu2)">'+pFS+'</td><td style="font-size:12px;color:var(--mu2)">'+(r[C.ind]||'—')+'</td><td style="font-size:12px;color:var(--mu2)">'+(r[C.pref]||'—')+'</td></tr>';
  });
  h+='</tbody></table></div>';return h;
}
function loadTab(name){
  var el=document.getElementById('p-'+name);if(!el)return;
  el.innerHTML='<div class="loading"><div class="spinner"></div><span class="loading-txt">Carregando '+name+'…</span></div>';
  fetchTab(name).then(function(rows){
    var h='';
    if(name==='pipeline')h=renderPipeline(rows);
    else if(name==='health')h=renderHealth(rows);
    else if(name==='cobertura')h=renderCobertura(rows);
    else if(name==='municipios')h=renderMunicipios(rows);
    el.innerHTML=h||'<div class="err-box">Sem dados.</div>';
  }).catch(function(err){el.innerHTML='<div class="err-box">❌ Erro ao carregar "'+name+'": '+err.message+'</div>';});
}
function sw(name){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});document.querySelectorAll('.pane').forEach(function(p){p.classList.remove('active');});document.querySelector('[data-tab="'+name+'"]').classList.add('active');document.getElementById('p-'+name).classList.add('active');}
function reloadAll(){Object.keys(_cache).forEach(function(k){delete _cache[k];});var info=wkInfo();document.getElementById('wbadge').textContent='W'+info.wk+' · Q'+info.q+' '+info.yr;document.getElementById('fwk').textContent='Semana '+info.wk+' · Q'+info.q+' '+info.yr;['pipeline','health','cobertura','municipios'].forEach(loadTab);}
reloadAll();
</script>
</body>
